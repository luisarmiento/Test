<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Web</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Calculadora Web</h1>
      <p id="authSubtitle">Inicia sesión para continuar</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="authBtn">Iniciar Sesión</button>
      </form>

      <div class="auth-switch">
        <span id="switchText">¿No tienes cuenta?</span>
        <a href="#" id="switchLink">Regístrate</a>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
