<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Panel de Administración</div>
    <div class="navbar-info">
      <span id="adminUserDisplay"></span>
      <a href="/dashboard.html" class="btn btn-small btn-primary" style="text-decoration:none;">Calculadora</a>
      <button class="btn btn-small btn-danger" id="logoutBtn">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="container">
    <div class="admin-grid">
      <div class="admin-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <h2 style="margin:0;">Usuarios</h2>
          <div class="bulk-toolbar" id="bulkToolbar">
            <span class="bulk-count" id="selectedCount">Ninguno seleccionado</span>
            <button class="btn btn-small btn-danger" id="bulkDeleteBtn">Eliminar seleccionados</button>
          </div>
        </div>
        <div id="userList"></div>
        <div class="pagination-compact" id="userPagination"></div>
      </div>

      <div class="admin-box">
        <h2>Cálculos</h2>
        <div class="filter-bar">
          <input type="text" class="search-input" id="userFilter" placeholder="Buscar usuario por nombre..." autocomplete="off">
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-calc-table">
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Expresión</th>
                <th>Resultado</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="calcTableBody"></tbody>
          </table>
        </div>
        <div class="pagination-compact" id="adminPagination"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <p id="modalMessage"></p>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
